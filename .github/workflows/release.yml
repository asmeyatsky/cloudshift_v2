name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
          - os: macos-latest
            target: x86_64-apple-darwin
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install maturin
      - name: Build CLI
        run: cargo build --release --target ${{ matrix.target }} -p cloudshift-cli
      - name: Build Python wheel
        run: maturin build --release --target ${{ matrix.target }} -m crates/cloudshift-py/Cargo.toml
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: cloudshift-${{ matrix.target }}
          path: |
            target/${{ matrix.target }}/release/cloudshift
            target/${{ matrix.target }}/release/cloudshift.exe
            target/wheels/*.whl

  publish:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            cloudshift-*/cloudshift
            cloudshift-*/cloudshift.exe
            cloudshift-*/*.whl
