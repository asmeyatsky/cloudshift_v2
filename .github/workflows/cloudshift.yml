name: CloudShift Migration Gate
on: [pull_request]

jobs:
  cloudshift:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install CloudShift
        run: pip install cloudshift
      - name: Run analysis
        run: |
          cloudshift analyse . --output json > manifest.json
          cloudshift transform . --dry-run --output sarif > results.sarif
      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: results.sarif
