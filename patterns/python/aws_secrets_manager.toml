[pattern]
id = "aws.secretsmanager.get_secret_value -> gcp.secretmanager.access_secret_version"
source = "aws"
target = "gcp"
language = "python"
confidence = 0.94
tags = ["security", "secrets", "secretsmanager"]

[pattern.detect]
query = '''
  (call
    function: (attribute
      object: (identifier) @client
      attribute: (identifier) @method (#eq? @method "get_secret_value"))
    arguments: (argument_list
      (keyword_argument
        name: (identifier) @param_name
        value: (_) @param_value)*) @args)
'''
imports = ["boto3"]

[pattern.transform]
template = '''secretmanager.SecretManagerServiceClient().access_secret_version(name={secret_id})'''
import_add = ["from google.cloud import secretmanager"]
import_remove = ["import boto3"]

[pattern.bindings]
secret_id = "args.SecretId"
project_id = "__project_id__"

[pattern.notes]
description = "AWS Secrets Manager returns SecretString or SecretBinary. GCP Secret Manager always returns bytes via payload.data. Version handling differs: AWS uses VersionId/VersionStage, GCP uses version numbers or 'latest'."
