[pattern]
id = "azure.storage.queue.delete_message -> gcp.pubsub.subscriber.acknowledge"
source = "azure"
target = "gcp"
language = "python"
confidence = 0.84
tags = ["messaging", "queue", "storage-queue", "pubsub"]

[pattern.detect]
query = '''
  (call
    function: (attribute
      object: (identifier) @client
      attribute: (identifier) @method (#eq? @method "delete_message"))
    arguments: (argument_list
      (_) @message) @args)
'''
imports = ["azure.storage.queue"]

[pattern.transform]
template = '''pubsub_v1.SubscriberClient().acknowledge(request={"subscription": SUBSCRIPTION_PATH, "ack_ids": [{args}]})'''
import_add = ["from google.cloud import pubsub_v1"]
import_remove = ["from azure.storage.queue import QueueClient", "from azure.storage.queue import QueueServiceClient"]

[pattern.bindings]
args = "args"

[pattern.notes]
description = "Azure Queue Storage delete_message removes a message after processing. Pub/Sub uses acknowledge to confirm receipt. Queue pop_receipt maps to Pub/Sub ack_id."
