[pattern]
id = "azure.sql.pyodbc.connect -> gcp.cloud_sql.connector"
source = "azure"
target = "gcp"
language = "python"
confidence = 0.72
tags = ["database", "azure-sql", "cloud-sql", "sql"]

[pattern.detect]
query = '''
  (call
    function: (attribute
      object: (identifier) @module (#eq? @module "pyodbc")
      attribute: (identifier) @method (#eq? @method "connect"))
    arguments: (argument_list
      (_) @conn_str) @args)
'''
imports = ["pyodbc"]

[pattern.transform]
template = '''Connector().connect(INSTANCE_CONNECTION_NAME, "pg8000", user=USER, password=PASS, db=DB)  # TODO: replace ODBC connection string with Cloud SQL instance connection name'''
import_add = ["from google.cloud.sql.connector import Connector"]
import_remove = ["import pyodbc"]

[pattern.bindings]
conn_str = "conn_str"

[pattern.notes]
description = "Azure SQL uses ODBC driver with server.database.windows.net endpoint. Cloud SQL uses the Cloud SQL Python Connector with instance connection names (project:region:instance). Authentication moves from SQL credentials to IAM database auth."
