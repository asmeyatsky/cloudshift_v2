[pattern]
id = "azure.tables.query_entities -> gcp.firestore.collection.where"
source = "azure"
target = "gcp"
language = "python"
confidence = 0.80
tags = ["table-storage", "firestore", "nosql", "query"]

[pattern.detect]
query = '''
  (call
    function: (attribute
      object: (identifier) @client
      attribute: (identifier) @method (#eq? @method "query_entities"))
    arguments: (argument_list
      (keyword_argument
        name: (identifier) @param_name
        value: (_) @param_value)*) @args)
'''
imports = ["azure.data.tables"]

[pattern.transform]
template = '''firestore.Client().collection(COLLECTION).where(FIELD, "==", VALUE).stream()  # TODO: map OData filter to Firestore where()'''
import_add = ["from google.cloud import firestore"]
import_remove = ["from azure.data.tables import TableServiceClient", "from azure.data.tables import TableClient"]

[pattern.bindings]

[pattern.notes]
description = "Azure Table Storage query_entities uses OData filter strings (e.g., \"PartitionKey eq 'pk' and RowKey eq 'rk'\") and optional select for projections. Firestore uses chained where() calls with Pythonic operators. Table Storage PartitionKey/RowKey map to Firestore document paths (collection/document). OData operators (eq, ne, gt, lt, ge, le) map to Firestore operators (==, !=, >, <, >=, <=). Complex OData filters with 'or' require multiple Firestore queries merged client-side."
