[pattern]
id = "aws.lambda.handler -> gcp.cloud_functions.handler"
source = "aws"
target = "gcp"
language = "python"
confidence = 0.90
tags = ["compute", "lambda", "cloud-functions", "serverless"]

[pattern.detect]
# Only module-level Lambda handlers: (event, context). Instance methods like
# create_role(self, role_name, ...) must NOT match — first param would be self.
query = '''
  (function_definition
    name: (identifier) @func_name
    parameters: (parameters
      (identifier) @event_param
      .
      (identifier) @context_param)
    (#not-eq? @event_param "self")
    (#not-eq? @event_param "cls")
    (#eq? @context_param "context")
    body: (block) @func_body)
'''
imports = []

[pattern.detect.constraints]
# Lambda handlers typically have (event, context) signature
param_count = 2

[pattern.transform]
template = '''
@functions_framework.http
def {func_name}(request):
    request_json = request.get_json(silent=True)
    {func_body}
'''
import_add = ["import functions_framework"]
import_remove = []

[pattern.bindings]
func_name = "func_name"
func_body = "func_body"
event_param = "event_param"
context_param = "context_param"

[pattern.notes]
description = "Matches only top-level handlers with signature (event, context) — not methods (self, …). Cloud Functions HTTP uses @functions_framework.http; S3-triggered Lambdas often need @functions_framework.cloud_event after redesign."
