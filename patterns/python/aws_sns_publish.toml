[pattern]
id = "aws.sns.publish -> gcp.pubsub.publish"
source = "aws"
target = "gcp"
language = "python"
confidence = 0.91
tags = ["messaging", "sns", "pubsub", "notification"]

[pattern.detect]
query = '''
  (call
    function: (attribute
      object: (identifier) @client
      attribute: (identifier) @method (#eq? @method "publish"))
    arguments: (argument_list
      (keyword_argument
        name: (identifier) @param_name
        value: (_) @param_value)*) @args)
'''
imports = ["boto3"]

[pattern.transform]
template = '''
  from google.cloud import pubsub_v1

  _publisher = pubsub_v1.PublisherClient()
  _topic_path = _publisher.topic_path({project_id}, {topic_name})
  _future = _publisher.publish(
      _topic_path,
      {message}.encode("utf-8"),
      subject={subject}
  )
  _future.result()
'''
import_add = ["from google.cloud import pubsub_v1"]
import_remove = ["import boto3"]

[pattern.bindings]
topic_name = "args.TopicArn"
message = "args.Message"
subject = "args.Subject"
project_id = "__project_id__"

[pattern.notes]
description = "SNS publish targets a TopicArn. Pub/Sub uses topic paths. SNS Subject is mapped as a Pub/Sub message attribute. SNS supports SMS/email endpoints which have no direct Pub/Sub equivalent."
