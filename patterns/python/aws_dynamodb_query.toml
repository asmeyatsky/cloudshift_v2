[pattern]
id = "aws.dynamodb.query -> gcp.firestore.collection.where"
source = "aws"
target = "gcp"
language = "python"
confidence = 0.82
tags = ["database", "dynamodb", "firestore", "nosql", "query"]

[pattern.detect]
query = '''
  (call
    function: (attribute
      object: (identifier) @client
      attribute: (identifier) @method (#eq? @method "query"))
    arguments: (argument_list
      (keyword_argument
        name: (identifier) @param_name
        value: (_) @param_value)*) @args)
'''
imports = ["boto3"]

[pattern.transform]
template = '''
  from google.cloud import firestore

  _db = firestore.Client()
  _collection_ref = _db.collection({table_name})
  _query = _collection_ref.where({key_condition_field}, "==", {key_condition_value})
  _results = [doc.to_dict() for doc in _query.stream()]
'''
import_add = ["from google.cloud import firestore"]
import_remove = ["import boto3"]

[pattern.bindings]
table_name = "args.TableName"
key_condition_field = "args.KeyConditionExpression.__field__"
key_condition_value = "args.ExpressionAttributeValues.__value__"

[pattern.notes]
description = "DynamoDB query uses KeyConditionExpression with ExpressionAttributeValues. Firestore uses chained .where() calls. Complex queries with multiple conditions need decomposition."
