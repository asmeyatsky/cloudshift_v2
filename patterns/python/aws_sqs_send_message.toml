[pattern]
id = "aws.sqs.send_message -> gcp.pubsub.publish"
source = "aws"
target = "gcp"
language = "python"
confidence = 0.92
tags = ["messaging", "sqs", "pubsub", "queue"]

[pattern.detect]
query = '''
  (call
    function: (attribute
      object: (identifier) @client
      attribute: (identifier) @method (#eq? @method "send_message"))
    arguments: (argument_list
      (keyword_argument
        name: (identifier) @param_name
        value: (_) @param_value)*) @args)
'''
imports = ["boto3"]

[pattern.transform]
template = '''pubsub_v1.PublisherClient().publish(TOPIC_PATH, body.encode("utf-8"))'''
import_add = ["from google.cloud import pubsub_v1"]
import_remove = ["import boto3"]

[pattern.notes]
description = "SQS uses QueueUrl while Pub/Sub uses topic paths. The queue URL needs to be mapped to a Pub/Sub topic name. Message attributes mapping may also be required."
