[pattern]
id = "aws.sqs.receive_message -> gcp.pubsub.pull"
source = "aws"
target = "gcp"
language = "python"
confidence = 0.88
tags = ["messaging", "sqs", "pubsub", "queue", "consume"]

[pattern.detect]
query = '''
  (call
    function: (attribute
      object: (identifier) @client
      attribute: (identifier) @method (#eq? @method "receive_message"))
    arguments: (argument_list
      (keyword_argument
        name: (identifier) @param_name
        value: (_) @param_value)*) @args)
'''
imports = ["boto3"]

[pattern.transform]
template = '''pubsub_v1.SubscriberClient().pull(request={"subscription": pubsub_v1.SubscriberClient().subscription_path({project_id}, {subscription_name}), "max_messages": {max_messages}})'''
import_add = ["from google.cloud import pubsub_v1"]
import_remove = ["import boto3"]

[pattern.bindings]
subscription_name = "args.QueueUrl"
max_messages = "args.MaxNumberOfMessages"
project_id = "__project_id__"

[pattern.notes]
description = "SQS receive_message polls for messages and auto-deletes after visibility timeout. Pub/Sub pull requires explicit acknowledgment. Consider using streaming pull for production workloads."
