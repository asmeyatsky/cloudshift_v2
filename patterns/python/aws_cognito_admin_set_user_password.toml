[pattern]
id = "aws.cognito.admin_set_user_password -> gcp.firebase_auth.update_user"
source = "aws"
target = "gcp"
language = "python"
confidence = 0.80
tags = ["auth", "cognito", "identity-platform", "firebase-auth"]

[pattern.detect]
query = '''
  (call
    function: (attribute
      object: (identifier) @client
      attribute: (identifier) @method (#eq? @method "admin_set_user_password"))
    arguments: (argument_list
      (keyword_argument
        name: (identifier) @param_name
        value: (_) @param_value)*) @args)
'''
imports = ["boto3"]

[pattern.transform]
template = '''auth.update_user({username}, password={password})'''
import_add = ["import firebase_admin", "from firebase_admin import auth"]
import_remove = ["import boto3"]

[pattern.bindings]
username = "args.Username"
password = "args.Password"

[pattern.notes]
description = "Cognito admin_set_user_password sets permanent or temporary passwords. Firebase Auth update_user sets password directly — there is no temporary password concept; use generatePasswordResetLink for forced reset flows."
