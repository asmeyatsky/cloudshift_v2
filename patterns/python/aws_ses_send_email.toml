[pattern]
id = "aws.ses.send_email -> gcp.sendgrid.send"
source = "aws"
target = "gcp"
language = "python"
confidence = 0.70
tags = ["email", "ses", "sendgrid", "messaging"]

[pattern.detect]
query = '''
  (call
    function: (attribute
      object: (identifier) @client
      attribute: (identifier) @method (#eq? @method "send_email"))
    arguments: (argument_list
      (keyword_argument
        name: (identifier) @param_name
        value: (_) @param_value)*) @args)
'''
imports = ["boto3"]

[pattern.transform]
template = '''SendGridAPIClient({api_key}).send(Mail(from_email={from_expr}, to_emails={to_expr}, subject={subject_expr}, plain_text_content={body_expr}))'''
import_add = ["from sendgrid import SendGridAPIClient", "from sendgrid.helpers.mail import Mail"]
import_remove = ["import boto3"]

[pattern.bindings]
from_expr = "args.Source"
to_expr = "args.Destination.ToAddresses"
subject_expr = "args.Message.Subject.Data"
body_expr = "args.Message.Body.Text.Data"
api_key = "__sendgrid_api_key__"

[pattern.notes]
description = "GCP does not have a native email service equivalent to SES. SendGrid is the recommended third-party service on GCP. SES supports SMTP and API modes; SendGrid uses its own API. HTML email body, CC/BCC, and attachments require additional SendGrid helper objects."
