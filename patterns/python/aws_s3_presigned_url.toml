[pattern]
id = "aws.s3.generate_presigned_url -> gcp.gcs.blob.generate_signed_url"
source = "aws"
target = "gcp"
language = "python"
confidence = 0.80
tags = ["storage", "s3", "gcs", "presigned", "signed-url"]

[pattern.detect]
query = '''
  (call
    function: (attribute
      object: (identifier) @client
      attribute: (identifier) @method (#eq? @method "generate_presigned_url"))
    arguments: (argument_list
      (keyword_argument
        name: (identifier) @param_name
        value: (_) @param_value)*) @args)
'''
imports = ["boto3"]

[pattern.transform]
template = '''storage.Client().bucket(BUCKET_NAME).blob(KEY).generate_signed_url(expiration={expiration_expr})  # TODO: extract Bucket and Key from Params dict'''
import_add = ["from google.cloud import storage"]
import_remove = ["import boto3"]

[pattern.bindings]
expiration_expr = "args.ExpiresIn"

[pattern.notes]
description = "S3 presigned URLs pass Bucket and Key inside a nested Params dict which cannot be auto-extracted. The generated code uses BUCKET_NAME and KEY placeholders that must be replaced with the actual values from the original Params={'Bucket': ..., 'Key': ...} argument. Confidence lowered to 0.80 to flag for manual review. GCS signed URLs accept a timedelta or integer seconds for expiration."
