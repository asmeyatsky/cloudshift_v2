[pattern]
id = "aws.sts.assume_role -> gcp.auth.workload_identity_federation"
source = "aws"
target = "gcp"
language = "python"
confidence = 0.73
tags = ["security", "iam", "sts", "workload-identity"]

[pattern.detect]
query = '''
  (call
    function: (attribute
      object: (identifier) @client
      attribute: (identifier) @method (#eq? @method "assume_role"))
    arguments: (argument_list
      (keyword_argument
        name: (identifier) @param_name
        value: (_) @param_value)*) @args)
'''
imports = ["boto3"]

[pattern.transform]
template = '''identity_pool.Credentials(audience={audience}, subject_token_type="urn:ietf:params:aws:token-type:aws4_request", token_url="https://sts.googleapis.com/v1/token", credential_source={credential_source})'''
import_add = ["from google.auth import identity_pool", "from google.auth.transport.requests import Request"]
import_remove = ["import boto3"]

[pattern.bindings]
role_arn = "args.RoleArn"
session_name = "args.RoleSessionName"
audience = "__wif_audience__"
credential_source = "__credential_source__"
impersonation_url = "__impersonation_url__"

[pattern.notes]
description = "STS assume_role returns temporary credentials for cross-account access. GCP Workload Identity Federation exchanges external tokens for GCP access tokens. This pattern requires significant configuration setup (WIF pool, provider, SA impersonation) that cannot be fully automated."
