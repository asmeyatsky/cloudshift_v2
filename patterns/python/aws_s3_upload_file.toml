[pattern]
id = "aws.s3.upload_file -> gcp.gcs.blob.upload_from_filename"
source = "aws"
target = "gcp"
language = "python"
confidence = 0.97
tags = ["storage", "s3", "gcs", "upload", "file"]

[pattern.detect]
query = '''
  (call
    function: (attribute
      object: (identifier) @client
      attribute: (identifier) @method (#eq? @method "upload_file"))
    arguments: (argument_list
      (_) @file_path
      (_) @bucket_name
      (_) @object_key) @args)
'''
imports = ["boto3"]

[pattern.transform]
template = '''storage.Client().bucket({bucket_name}).blob({object_key}).upload_from_filename({file_path})'''
import_add = ["from google.cloud import storage"]
import_remove = ["import boto3"]

[pattern.bindings]
file_path = "args[0]"
bucket_name = "args[1]"
object_key = "args[2]"
