[pattern]
id = "aws.kinesis.put_record -> gcp.pubsub.publish"
source = "aws"
target = "gcp"
language = "python"
confidence = 0.87
tags = ["streaming", "kinesis", "pubsub", "data-pipeline"]

[pattern.detect]
query = '''
  (call
    function: (attribute
      object: (identifier) @client
      attribute: (identifier) @method (#eq? @method "put_record"))
    arguments: (argument_list
      (keyword_argument
        name: (identifier) @param_name
        value: (_) @param_value)*) @args)
'''
imports = ["boto3"]

[pattern.transform]
template = '''pubsub_v1.PublisherClient().publish(pubsub_v1.PublisherClient().topic_path({project_id}, {stream_name}), {data}, partition_key={partition_key})'''
import_add = ["from google.cloud import pubsub_v1"]
import_remove = ["import boto3"]

[pattern.bindings]
stream_name = "args.StreamName"
data = "args.Data"
partition_key = "args.PartitionKey"
project_id = "__project_id__"

[pattern.notes]
description = "Kinesis uses shards and partition keys for ordering. Pub/Sub uses ordering keys for ordered delivery within a region. Kinesis PartitionKey maps to Pub/Sub ordering_key attribute."
