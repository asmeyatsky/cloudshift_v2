[pattern]
id = "aws.s3.copy_object -> gcp.gcs.copy_blob"
source = "aws"
target = "gcp"
language = "python"
confidence = 0.78
tags = ["storage", "s3", "gcs", "copy"]

[pattern.detect]
query = '''
  (call
    function: (attribute
      object: (identifier) @client
      attribute: (identifier) @method (#eq? @method "copy_object"))
    arguments: (argument_list
      (keyword_argument
        name: (identifier) @param_name
        value: (_) @param_value)*) @args)
'''
imports = ["boto3"]

[pattern.transform]
template = '''storage.Client().bucket({dest_bucket}).copy_blob(source_blob, storage.Client().bucket({dest_bucket}), {dest_key})  # TODO: define source_blob = bucket.blob(source_key)'''
import_add = ["from google.cloud import storage"]
import_remove = ["import boto3"]

[pattern.bindings]
dest_bucket = "args.Bucket"
dest_key = "args.Key"

[pattern.notes]
description = "S3 copy_object uses CopySource dict with Bucket/Key fields that cannot be automatically decomposed. GCS copy_blob takes source blob, destination bucket, and new name. The source_blob must be defined manually from the original CopySource dict. Cross-region copies may behave differently between providers."
