[pattern]
id = "aws.boto3.client.secretsmanager -> gcp.secretmanager.Client"
source = "aws"
target = "gcp"
language = "python"
confidence = 0.93
tags = ["security", "secrets", "secretsmanager", "client-init"]

[pattern.detect]
query = '''
  (call
    function: (attribute
      object: (identifier) @module (#eq? @module "boto3")
      attribute: (identifier) @method (#eq? @method "client"))
    arguments: (argument_list
      (string
        (string_content) @service_name (#eq? @service_name "secretsmanager"))) @args)
'''
imports = ["boto3"]

[pattern.transform]
template = '''secretmanager.SecretManagerServiceClient()'''
import_add = ["from google.cloud import secretmanager"]
import_remove = ["import boto3"]

[pattern.notes]
description = "Replaces boto3.client('secretsmanager') with GCP Secret Manager client. AWS uses secret names directly while GCP uses project-based resource paths."
