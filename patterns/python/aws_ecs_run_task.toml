[pattern]
id = "aws.ecs.run_task -> gcp.cloud_run.run_job"
source = "aws"
target = "gcp"
language = "python"
confidence = 0.80
tags = ["containers", "ecs", "cloud-run", "serverless"]

[pattern.detect]
query = '''
  (call
    function: (attribute
      object: (identifier) @client
      attribute: (identifier) @method (#eq? @method "run_task"))
    arguments: (argument_list
      (keyword_argument
        name: (identifier) @param_name
        value: (_) @param_value)*) @args)
'''
imports = ["boto3"]

[pattern.transform]
template = '''run_v2.JobsClient().run_job(request={"name": f"projects/PROJECT_ID/locations/REGION/jobs/JOB_NAME"})  # TODO: map ECS task definition to Cloud Run Job'''
import_add = ["from google.cloud import run_v2"]
import_remove = ["import boto3"]

[pattern.bindings]

[pattern.notes]
description = "ECS run_task launches a one-off task from a task definition on a cluster. Cloud Run Jobs execute containerized tasks without a persistent cluster. ECS task definitions map to Cloud Run Job specs. ECS launch types (FARGATE/EC2) have no direct equivalent — Cloud Run is always serverless. Network configuration, capacity providers, and placement constraints require manual mapping."
