[pattern]
id = "aws.boto3.client.iam -> gcp.iam_credentials_v1.IAMCredentialsClient"
source = "aws"
target = "gcp"
language = "python"
confidence = 0.72
tags = ["iam", "identity", "credentials", "client-init"]

[pattern.detect]
query = '''
  (call
    function: (attribute
      object: (identifier) @module (#eq? @module "boto3")
      attribute: (identifier) @method (#eq? @method "client"))
    arguments: (argument_list
      (string
        (string_content) @service_name (#eq? @service_name "iam"))) @args)
'''
imports = ["boto3"]

[pattern.transform]
template = '''iam_credentials_v1.IAMCredentialsClient()'''
import_add = ["from google.cloud import iam_credentials_v1"]
import_remove = ["import boto3"]

[pattern.notes]
description = "IAM roles/policies have no 1:1 client. IAMCredentialsClient signs blobs only — do not call create_role/attach_role_policy on it. See samples/gcp_reference/iam_manager_analogue.py for a hand-written analogue."
