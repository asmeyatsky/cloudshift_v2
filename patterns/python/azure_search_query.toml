[pattern]
id = "azure.search.search -> gcp.discoveryengine.search"
source = "azure"
target = "gcp"
language = "python"
confidence = 0.68
tags = ["search", "ai-search", "discovery-engine"]

[pattern.detect]
query = '''
  (call
    function: (attribute
      object: (identifier) @client
      attribute: (identifier) @method (#eq? @method "search"))
    arguments: (argument_list
      (keyword_argument
        name: (identifier) @param_name
        value: (_) @param_value)*) @args)
'''
imports = ["azure.search.documents"]

[pattern.transform]
template = '''discoveryengine.SearchServiceClient().search(request={"serving_config": SERVING_CONFIG, "query": q})'''
import_add = ["from google.cloud import discoveryengine_v1 as discoveryengine"]
import_remove = ["from azure.search.documents import SearchClient"]

[pattern.notes]
description = "Azure AI Search 'search' accepts search_text, filter, top, skip, etc. Vertex AI Search uses serving_config-based requests with query and page_size. Facets, filters, and scoring profiles require different configuration."
