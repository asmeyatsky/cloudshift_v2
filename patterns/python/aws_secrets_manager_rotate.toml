[pattern]
id = "aws.secretsmanager.rotate_secret -> gcp.secretmanager.add_secret_version"
source = "aws"
target = "gcp"
language = "python"
confidence = 0.70
tags = ["security", "secrets", "rotation"]

[pattern.detect]
query = '''
  (call
    function: (attribute
      object: (identifier) @client
      attribute: (identifier) @method (#eq? @method "rotate_secret"))
    arguments: (argument_list
      (keyword_argument
        name: (identifier) @param_name
        value: (_) @param_value)*) @args)
'''
imports = ["boto3"]

[pattern.transform]
template = '''secretmanager.SecretManagerServiceClient().add_secret_version(parent={secret_id}, payload={"data": NEW_SECRET_VALUE})  # TODO: GCP Secret Manager has no built-in rotation; use Cloud Scheduler + Cloud Function to rotate'''
import_add = ["from google.cloud import secretmanager"]
import_remove = ["import boto3"]

[pattern.bindings]
secret_id = "args.SecretId"

[pattern.notes]
description = "AWS Secrets Manager has built-in rotation with Lambda rotation functions. GCP Secret Manager has no native rotation — implement with Cloud Scheduler triggering a Cloud Function that creates a new secret version and updates dependent services."
