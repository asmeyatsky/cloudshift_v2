[pattern]
id = "azure.functions.handler -> gcp.cloud_functions.handler"
source = "azure"
target = "gcp"
language = "python"
confidence = 0.80
tags = ["compute", "azure-functions", "cloud-functions", "serverless"]

[pattern.detect]
query = '''
  (function_definition
    name: (identifier) @func_name
    parameters: (parameters (identifier) @req_param)
    body: (block) @func_body)

  (function_definition
    name: (identifier) @func_name
    parameters: (parameters (typed_parameter (identifier) @req_param))
    body: (block) @func_body)
'''
imports = ["azure.functions"]

[pattern.detect.constraints]
param_count = 1
decorator_hint = "func.route"

[pattern.transform]
template = '''
@functions_framework.http
def {func_name}(request):
    {func_body}
'''
import_add = ["import functions_framework"]
import_remove = ["import azure.functions as func"]

[pattern.bindings]
func_name = "func_name"
func_body = "func_body"
req_param = "req_param"

[pattern.notes]
description = "Matches only single-parameter defs (no comma at param top-level), not self/cls, not dunder names — avoids class methods like __init__ or get_metrics(self, ...). Typed req (HttpRequest) OK. Cloud Functions use request.get_json(); review func.json bindings."
