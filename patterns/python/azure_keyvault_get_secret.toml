[pattern]
id = "azure.keyvault.get_secret -> gcp.secretmanager.access_secret_version"
source = "azure"
target = "gcp"
language = "python"
confidence = 0.93
tags = ["security", "secrets", "keyvault", "secretmanager"]

[pattern.detect]
query = '''
  (call
    function: (attribute
      object: (identifier) @client
      attribute: (identifier) @method (#eq? @method "get_secret"))
    arguments: (argument_list
      (_) @secret_name
      (keyword_argument
        name: (identifier) @param_name
        value: (_) @param_value)*) @args)
'''
imports = ["azure.keyvault.secrets"]

[pattern.transform]
template = '''
  from google.cloud import secretmanager

  _client = secretmanager.SecretManagerServiceClient()
  _name = _client.secret_version_path({project_id}, {secret_name}, "latest")
  _response = _client.access_secret_version(request={"name": _name})
  _secret_value = _response.payload.data.decode("UTF-8")
'''
import_add = ["from google.cloud import secretmanager"]
import_remove = ["from azure.keyvault.secrets import SecretClient", "from azure.identity import DefaultAzureCredential"]

[pattern.bindings]
secret_name = "args[0]"
project_id = "__project_id__"

[pattern.notes]
description = "Azure Key Vault uses vault URLs and DefaultAzureCredential. GCP Secret Manager uses project-based paths and Application Default Credentials. Azure returns KeyVaultSecret with .value property, GCP returns payload.data bytes."
