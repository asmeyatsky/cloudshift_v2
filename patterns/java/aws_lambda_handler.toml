}
'''
import_add = ["import com.google.cloud.functions.HttpFunction", "import com.google.cloud.functions.HttpRequest", "import com.google.cloud.functions.HttpResponse"]
import_remove = ["import com.amazonaws.services.lambda.runtime.Context", "import com.amazonaws.services.lambda.runtime.RequestHandler"]

[pattern.bindings]
class_name = "class_name"
method_body = "method_body"
input_type = "input_type"
input_param = "input_param"

[pattern.notes]
description = "Lambda RequestHandler<I,O> returns a value. Cloud Functions HttpFunction writes to response. The return type mapping and error handling need manual adjustment. BackgroundFunction is available for event-driven patterns."
