[pattern]
id = "aws.lambda.RequestHandler -> gcp.cloud_functions.HttpFunction"
source = "aws"
target = "gcp"
language = "java"
confidence = 0.89
tags = ["compute", "lambda", "cloud-functions", "serverless"]

[pattern.detect]
query = '''
  (class_declaration
    name: (identifier) @class_name
    interfaces: (super_interfaces
      (interface_type_list
        (type_identifier) @interface_name (#eq? @interface_name "RequestHandler")))
    body: (class_body
      (method_declaration
        name: (identifier) @method_name (#eq? @method_name "handleRequest")
        parameters: (formal_parameters
          (formal_parameter
            type: (_) @input_type
            name: (identifier) @input_param)
          (formal_parameter
            type: (type_identifier) @context_type (#eq? @context_type "Context")
            name: (identifier) @context_param))
        body: (block) @method_body)))
'''
imports = ["com.amazonaws.services.lambda.runtime"]

[pattern.transform]
template = '''
public class {class_name} implements HttpFunction {
    @Override
    public void service(HttpRequest request, HttpResponse response) throws Exception {
        String body = request.getReader().lines().collect(java.util.stream.Collectors.joining());
        {method_body}
        response.setStatusCode(200);
