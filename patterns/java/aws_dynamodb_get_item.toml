[pattern]
id = "aws.dynamodb.DynamoDbClient.getItem -> gcp.firestore.Firestore.get"
source = "aws"
target = "gcp"
language = "java"
confidence = 0.84
tags = ["database", "dynamodb", "firestore", "nosql"]

[pattern.detect]
query = '''
  (method_invocation
    object: (identifier) @client
    name: (identifier) @method (#eq? @method "getItem")
    arguments: (argument_list
      (_) @request) @args)
'''
imports = ["software.amazon.awssdk.services.dynamodb"]

[pattern.transform]
template = '''FirestoreOptions.getDefaultInstance().getService().collection({table_name}).document({key_value}).get().get()'''
import_add = ["import com.google.cloud.firestore.DocumentReference", "import com.google.cloud.firestore.DocumentSnapshot", "import com.google.cloud.firestore.Firestore", "import com.google.cloud.firestore.FirestoreOptions"]
import_remove = ["import software.amazon.awssdk.services.dynamodb.DynamoDbClient", "import software.amazon.awssdk.services.dynamodb.model.GetItemRequest", "import software.amazon.awssdk.services.dynamodb.model.GetItemResponse"]

[pattern.bindings]
table_name = "request.tableName()"
key_value = "request.key().__key__"

[pattern.notes]
description = "DynamoDB getItem returns GetItemResponse with item() as Map<String, AttributeValue>. Firestore get() returns ApiFuture<DocumentSnapshot>. The .get() blocks for the result. Check DocumentSnapshot.exists() for missing documents."
