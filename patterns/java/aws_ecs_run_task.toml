[pattern]
id = "aws.ecs.EcsClient.runTask -> gcp.run.jobs.RunJobRequest"
source = "aws"
target = "gcp"
language = "java"
confidence = 0.73
tags = ["compute", "ecs", "cloud-run", "containers", "jobs"]

[pattern.detect]
query = '''
  (method_invocation
    object: (identifier) @client
    name: (identifier) @method (#eq? @method "runTask")
    arguments: (argument_list
      (_) @request) @args)
'''
imports = ["software.amazon.awssdk.services.ecs"]

[pattern.transform]
template = '''JobsClient.create().runJob(RunJobRequest.newBuilder().setName(JobName.of({project_id}, {region}, {job_name}).toString()).build()).get()'''
import_add = ["import com.google.cloud.run.v2.JobsClient", "import com.google.cloud.run.v2.RunJobRequest", "import com.google.cloud.run.v2.JobName", "import com.google.cloud.run.v2.Execution"]
import_remove = ["import software.amazon.awssdk.services.ecs.EcsClient", "import software.amazon.awssdk.services.ecs.model.RunTaskRequest", "import software.amazon.awssdk.services.ecs.model.RunTaskResponse"]

[pattern.bindings]
task_definition = "request.taskDefinition()"
cluster = "request.cluster()"
job_name = "request.taskDefinition()"
project_id = "__project_id__"
region = "__region__"

[pattern.notes]
description = "ECS runTask launches a task on a cluster from a task definition. Cloud Run Jobs execute containerized tasks without managing infrastructure. ECS task definitions map to Cloud Run job templates (container image, CPU, memory, env vars). ECS launch type FARGATE maps well to Cloud Run; EC2 launch type requires GKE. ECS task count maps to Cloud Run job task count. Networking (awsvpc, subnets) maps to Cloud Run VPC connectors."
