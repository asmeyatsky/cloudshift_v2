[pattern]
id = "aws.secretsmanager.SecretsManagerClient.getSecretValue -> gcp.secretmanager.SecretManagerServiceClient.accessSecretVersion"
source = "aws"
target = "gcp"
language = "java"
confidence = 0.93
tags = ["security", "secrets", "secretsmanager"]

[pattern.detect]
query = '''
  (method_invocation
    object: (identifier) @client
    name: (identifier) @method (#eq? @method "getSecretValue")
    arguments: (argument_list
      (_) @request) @args)
'''
imports = ["software.amazon.awssdk.services.secretsmanager"]

[pattern.transform]
template = '''SecretManagerServiceClient.create().accessSecretVersion(SecretVersionName.of({project_id}, {secret_id}, "latest")).getPayload().getData().toStringUtf8()'''
import_add = ["import com.google.cloud.secretmanager.v1.SecretManagerServiceClient", "import com.google.cloud.secretmanager.v1.SecretVersionName", "import com.google.cloud.secretmanager.v1.AccessSecretVersionResponse"]
import_remove = ["import software.amazon.awssdk.services.secretsmanager.SecretsManagerClient", "import software.amazon.awssdk.services.secretsmanager.model.GetSecretValueRequest", "import software.amazon.awssdk.services.secretsmanager.model.GetSecretValueResponse"]

[pattern.bindings]
secret_id = "request.secretId()"
project_id = "__project_id__"

[pattern.notes]
description = "AWS Secrets Manager getSecretValue returns the secret string or binary directly. GCP Secret Manager accessSecretVersion returns a response with payload.data as ByteString. SecretManagerServiceClient is AutoCloseable and should be used in try-with-resources."
