[pattern]
id = "aws.dynamodb.DynamoDbClient.deleteItem -> gcp.firestore.Firestore.delete"
source = "aws"
target = "gcp"
language = "java"
confidence = 0.90
tags = ["database", "dynamodb", "firestore", "nosql", "delete"]

[pattern.detect]
query = '''
  (method_invocation
    object: (identifier) @client
    name: (identifier) @method (#eq? @method "deleteItem")
    arguments: (argument_list
      (_) @request) @args)
'''
imports = ["software.amazon.awssdk.services.dynamodb"]

[pattern.transform]
template = '''FirestoreOptions.getDefaultInstance().getService().collection({table_name}).document({key_value}).delete().get()'''
import_add = ["import com.google.cloud.firestore.Firestore", "import com.google.cloud.firestore.FirestoreOptions", "import com.google.cloud.firestore.WriteResult"]
import_remove = ["import software.amazon.awssdk.services.dynamodb.DynamoDbClient", "import software.amazon.awssdk.services.dynamodb.model.DeleteItemRequest"]

[pattern.bindings]
table_name = "request.tableName()"
key_value = "request.key().__key__"
