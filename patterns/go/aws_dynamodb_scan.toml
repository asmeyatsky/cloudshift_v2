[pattern]
id = "aws.dynamodb.ScanInput -> gcp.firestore.CollectionRef.Documents"
source = "aws"
target = "gcp"
language = "go"
confidence = 0.80
tags = ["database", "dynamodb", "firestore", "nosql", "scan"]

[pattern.detect]
query = '''
  (call_expression
    function: (selector_expression
      operand: (identifier) @client
      field: (field_identifier) @method (#eq? @method "Scan"))
    arguments: (argument_list
      (_) @ctx
      (unary_expression
        operand: (composite_literal
          type: (qualified_type
            package: (package_identifier) @pkg (#eq? @pkg "dynamodb")
            name: (type_identifier) @type (#eq? @type "ScanInput"))
          body: (literal_value) @params))))
'''
imports = ["github.com/aws/aws-sdk-go-v2/service/dynamodb"]

[pattern.transform]
template = '''
iter := client.Collection({table_name}).Documents(ctx)
defer iter.Stop()
for {
    doc, err := iter.Next()
    if err == iterator.Done {
        break
    }
    if err != nil {
        return nil, fmt.Errorf("Documents.Next: %%w", err)
    }
    _ = doc.Data()
}
'''
import_add = ["cloud.google.com/go/firestore", "google.golang.org/api/iterator"]
import_remove = ["github.com/aws/aws-sdk-go-v2/service/dynamodb"]

[pattern.bindings]
table_name = "params.TableName"

[pattern.notes]
description = "DynamoDB Scan reads every item in a table with optional FilterExpression. Firestore Documents(ctx) returns an iterator over all documents in a collection. DynamoDB Scan supports parallel scan via Segment/TotalSegments; Firestore has no direct equivalent but supports partitioned queries via CollectionGroup. DynamoDB Scan is paginated via ExclusiveStartKey; Firestore iterator handles pagination internally."
