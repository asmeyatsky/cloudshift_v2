[pattern]
id = "aws.secretsmanager.GetSecretValueInput -> gcp.secretmanager.AccessSecretVersion"
source = "aws"
target = "gcp"
language = "go"
confidence = 0.93
tags = ["security", "secrets", "secretsmanager"]

[pattern.detect]
query = '''
  (call_expression
    function: (selector_expression
      operand: (identifier) @client
      field: (field_identifier) @method (#eq? @method "GetSecretValue"))
    arguments: (argument_list
      (_) @ctx
      (unary_expression
        operand: (composite_literal
          type: (qualified_type
            package: (package_identifier) @pkg (#eq? @pkg "secretsmanager")
            name: (type_identifier) @type (#eq? @type "GetSecretValueInput"))
          body: (literal_value) @params))))
'''
imports = ["github.com/aws/aws-sdk-go-v2/service/secretsmanager"]

[pattern.transform]
template = '''
result, err := client.AccessSecretVersion(ctx, &secretmanagerpb.AccessSecretVersionRequest{
    Name: fmt.Sprintf("projects/%s/secrets/%s/versions/latest", {project_id}, {secret_id}),
})
if err != nil {
    return nil, fmt.Errorf("AccessSecretVersion: %%w", err)
}
secret := string(result.Payload.Data)
'''
import_add = ["cloud.google.com/go/secretmanager/apiv1", "cloud.google.com/go/secretmanager/apiv1/secretmanagerpb"]
import_remove = ["github.com/aws/aws-sdk-go-v2/service/secretsmanager"]

[pattern.bindings]
secret_id = "params.SecretId"
project_id = "__project_id__"

[pattern.notes]
description = "AWS Secrets Manager GetSecretValue returns SecretString or SecretBinary. GCP Secret Manager AccessSecretVersion returns Payload.Data as []byte. The GCP client is created via secretmanager.NewClient(ctx). Both support versioning; AWS uses VersionId/VersionStage while GCP uses version numbers in the resource name."
