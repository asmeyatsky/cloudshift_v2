[pattern]
id = "aws.ses.SendEmailInput -> sendgrid.SendEmail"
source = "aws"
target = "gcp"
language = "go"
confidence = 0.78
tags = ["messaging", "ses", "sendgrid", "email"]

[pattern.detect]
query = '''
  (call_expression
    function: (selector_expression
      operand: (identifier) @client
      field: (field_identifier) @method (#eq? @method "SendEmail"))
    arguments: (argument_list
      (_) @ctx
      (unary_expression
        operand: (composite_literal
          type: (qualified_type
            package: (package_identifier) @pkg (#eq? @pkg "ses")
            name: (type_identifier) @type (#eq? @type "SendEmailInput"))
          body: (literal_value) @params))))
'''
imports = ["github.com/aws/aws-sdk-go-v2/service/ses"]

[pattern.transform]
template = '''
from := mail.NewEmail({sender_name}, {sender_email})
to := mail.NewEmail("", {recipient})
message := mail.NewSingleEmail(from, {subject}, to, {body_text}, {body_html})
sgClient := sendgrid.NewSendClient({api_key})
resp, err := sgClient.Send(message)
if err != nil {
    return fmt.Errorf("SendGrid.Send: %%w", err)
}
if resp.StatusCode >= 400 {
    return fmt.Errorf("SendGrid error: status %d, body: %s", resp.StatusCode, resp.Body)
}
'''
import_add = ["github.com/sendgrid/sendgrid-go", "github.com/sendgrid/sendgrid-go/helpers/mail"]
import_remove = ["github.com/aws/aws-sdk-go-v2/service/ses"]

[pattern.bindings]
sender_email = "params.Source"
sender_name = "params.Source.__name__"
recipient = "params.Destination.ToAddresses[0]"
subject = "params.Message.Subject.Data"
body_text = "params.Message.Body.Text.Data"
body_html = "params.Message.Body.Html.Data"
api_key = "__sendgrid_api_key__"

[pattern.notes]
description = "SES SendEmail is a managed email service with domain verification. GCP does not have a native email service; SendGrid is the recommended third-party provider on GCP. SES uses IAM for authorization; SendGrid uses API keys. SES supports ConfigurationSets for tracking; SendGrid has similar tracking categories. SES handles bounces and complaints via SNS notifications; SendGrid uses Event Webhooks. The SendGrid Go library uses a builder pattern with helpers/mail."
