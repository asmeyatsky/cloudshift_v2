[pattern]
id = "azure.container_registry -> gcp.artifact_registry_repository"
source = "azure"
target = "gcp"
language = "hcl"
confidence = 0.85
tags = ["terraform", "containers", "registry", "acr", "artifact-registry"]

[pattern.detect]
query = '''
  (block
    (identifier) @block_type (#eq? @block_type "resource")
    (string_lit) @resource_type (#eq? @resource_type "\"azurerm_container_registry\"")
    (string_lit) @resource_name
    (body) @resource_body)
'''
imports = []

[pattern.transform]
template = '''
  resource "google_artifact_registry_repository" {resource_name} {
    repository_id = {registry_name}
    project       = {project_id}
    location      = {region}
    format        = "DOCKER"
    description   = "Migrated from Azure Container Registry: {registry_name}"

    # Azure SKU: {sku}
    # Mapping:
    #   Basic    -> Artifact Registry (no tier equivalent, pay per storage/egress)
    #   Standard -> Artifact Registry
    #   Premium  -> Artifact Registry with CMEK and VPC SC

    # Azure admin_enabled: {admin_enabled}
    # Artifact Registry uses IAM for access control, not admin credentials.
    # Grant roles/artifactregistry.reader for pull access,
    # roles/artifactregistry.writer for push access.

    # Azure georeplications: {georeplications}
    # Artifact Registry supports multi-region repositories via location choice.
    # For replication, create repositories in multiple regions.

    # Azure network_rule_set: {network_rule_set}
    # Use VPC Service Controls for network-level access restrictions.

    # Azure encryption: {encryption}
    # docker_config {
    #   immutable_tags = false
    # }
    # kms_key_name = google_kms_crypto_key.example.id

    # Azure retention_policy: {retention_policy}
    # cleanup_policies {
    #   id     = "delete-old"
    #   action = "DELETE"
    #   condition {
    #     older_than = "2592000s"
    #   }
    # }

    labels = {tags}
  }
'''
import_add = []
import_remove = []

[pattern.bindings]
resource_name = "resource_name"
registry_name = "resource_body.name"
sku = "resource_body.sku"
admin_enabled = "resource_body.admin_enabled"
georeplications = "resource_body.georeplications"
network_rule_set = "resource_body.network_rule_set"
encryption = "resource_body.encryption"
retention_policy = "resource_body.retention_policy"
tags = "resource_body.tags"
region = "__region__"
project_id = "__project_id__"

[pattern.notes]
description = "Azure Container Registry stores Docker and OCI images. Google Artifact Registry supports Docker, Maven, npm, Python, and more. ACR SKUs (Basic/Standard/Premium) have no direct Artifact Registry equivalent; pricing is per storage and egress. ACR admin access maps to IAM roles (artifactregistry.reader/writer). ACR geo-replication maps to multi-region Artifact Registry repositories. ACR content trust (Docker Content Trust) maps to Binary Authorization. ACR tasks for image building map to Cloud Build."
