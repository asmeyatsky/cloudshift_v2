[pattern]
id = "aws.glue_catalog_database -> gcp.bigquery_dataset"
source = "aws"
target = "gcp"
language = "hcl"
confidence = 0.75
tags = ["terraform", "analytics", "data-catalog", "glue", "bigquery"]

[pattern.detect]
query = '''
  (block
    (identifier) @block_type (#eq? @block_type "resource")
    (string_lit) @resource_type (#eq? @resource_type "\"aws_glue_catalog_database\"")
    (string_lit) @resource_name
    (body) @resource_body)
'''
imports = []

[pattern.transform]
template = '''
  resource "google_bigquery_dataset" {resource_name} {
    dataset_id  = {database_name}
    project     = {project_id}
    location    = {region}
    description = {description}

    # Glue catalog_id: {catalog_id}
    # GCP uses project_id as the equivalent namespace

    # AWS location_uri: {location_uri}
    # Glue databases reference S3 locations for underlying data.
    # BigQuery datasets store data natively; for external data,
    # use google_bigquery_table with external_data_configuration.

    # AWS parameters: {parameters}
    # Glue database parameters have no direct BigQuery equivalent

    default_table_expiration_ms  = null
    default_partition_expiration_ms = null

    labels = {tags}

    # TODO: Map aws_glue_catalog_table resources to google_bigquery_table
    # Glue table SerDe/InputFormat/OutputFormat define data formats.
    # BigQuery uses schema definitions and external table configurations.

    # TODO: Map aws_glue_crawler to BigQuery scheduled queries or
    # Data Catalog discovery scanning.

    # access {
    #   role          = "OWNER"
    #   special_group = "projectOwners"
    # }
    # access {
    #   role          = "READER"
    #   special_group = "projectReaders"
    # }
  }
'''
import_add = []
import_remove = []

[pattern.bindings]
resource_name = "resource_name"
database_name = "resource_body.name"
description = "resource_body.description"
catalog_id = "resource_body.catalog_id"
location_uri = "resource_body.location_uri"
parameters = "resource_body.parameters"
tags = "resource_body.tags"
region = "__region__"
project_id = "__project_id__"

[pattern.notes]
description = "Glue Catalog databases are metadata containers in the Hive Metastore. BigQuery datasets are the closest equivalent, serving as containers for tables. Glue crawlers that auto-discover schemas map to Data Catalog or BigQuery schema auto-detection. Glue ETL jobs map to Dataflow or BigQuery scheduled queries. Glue table definitions (SerDe, InputFormat) map to BigQuery table schemas and external_data_configuration for data in GCS. Glue partitions map to BigQuery partitioned tables."
