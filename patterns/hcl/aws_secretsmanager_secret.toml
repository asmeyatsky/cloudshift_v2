[pattern]
id = "aws.secretsmanager_secret -> gcp.secret_manager_secret"
source = "aws"
target = "gcp"
language = "hcl"
confidence = 0.92
tags = ["terraform", "security", "secrets"]

[pattern.detect]
query = '''
  (block
    (identifier) @block_type (#eq? @block_type "resource")
    (string_lit) @resource_type (#eq? @resource_type "\"aws_secretsmanager_secret\"")
    (string_lit) @resource_name
    (body) @resource_body)
'''
imports = []

[pattern.transform]
template = '''
  resource "google_secret_manager_secret" {resource_name} {
    secret_id = {secret_name}
    project   = {project_id}

    replication {
      auto {}
    }

    labels = {tags}
  }

  # If aws_secretsmanager_secret_version exists, map to:
  # resource "google_secret_manager_secret_version" "{resource_name}_version" {
  #   secret      = google_secret_manager_secret.{resource_name}.id
  #   secret_data = {secret_value}
  # }
'''
import_add = []
import_remove = []

[pattern.bindings]
resource_name = "resource_name"
secret_name = "resource_body.name"
tags = "resource_body.tags"
project_id = "__project_id__"

[pattern.notes]
description = "AWS separates secret metadata (aws_secretsmanager_secret) from values (aws_secretsmanager_secret_version). GCP similarly separates google_secret_manager_secret and google_secret_manager_secret_version. Rotation config maps to google_secret_manager_secret rotation block."
