[pattern]
id = "aws.secretsmanager.GetSecretValueCommand -> gcp.secretmanager.accessSecretVersion"
source = "aws"
target = "gcp"
language = "typescript"
confidence = 0.93
tags = ["security", "secrets", "secretsmanager"]

[pattern.detect]
query = '''
  (call_expression
    function: (member_expression
      object: (identifier) @client
      property: (property_identifier) @method (#eq? @method "send"))
    arguments: (arguments
      (new_expression
        constructor: (identifier) @command (#eq? @command "GetSecretValueCommand")
        arguments: (arguments
          (object) @params))))
'''
imports = ["@aws-sdk/client-secrets-manager"]

[pattern.transform]
template = '''await new SecretManagerServiceClient().accessSecretVersion({ name: `projects/${project_id}/secrets/${secret_id}/versions/latest` })'''
import_add = ["import {SecretManagerServiceClient} from \"@google-cloud/secret-manager\""]
import_remove = ["import {SecretsManagerClient, GetSecretValueCommand} from \"@aws-sdk/client-secrets-manager\""]

[pattern.bindings]
secret_id = "params.SecretId"
project_id = "__project_id__"
