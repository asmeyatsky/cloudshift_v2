[pattern]
id = "azure.keyvault.getSecret -> gcp.secretmanager.accessSecretVersion"
source = "azure"
target = "gcp"
language = "typescript"
confidence = 0.93
tags = ["security", "secrets", "keyvault", "secret-manager"]

[pattern.detect]
query = '''
  (call_expression
    function: (member_expression
      object: (identifier) @client
      property: (property_identifier) @method (#eq? @method "getSecret"))
    arguments: (arguments
      (string) @secret_name))
'''
imports = ["@azure/keyvault-secrets"]

[pattern.transform]
template = '''await new SecretManagerServiceClient().accessSecretVersion({ name: `projects/${project_id}/secrets/${secret_name}/versions/latest` })'''
import_add = ["import {SecretManagerServiceClient} from \"@google-cloud/secret-manager\""]
import_remove = ["import {SecretClient} from \"@azure/keyvault-secrets\""]

[pattern.bindings]
secret_name = "secret_name"
project_id = "__project_id__"

[pattern.notes]
description = "Azure Key Vault getSecret returns SecretProperties with .value. GCP Secret Manager accessSecretVersion returns [version] where version.payload.data contains the secret as a Buffer. Azure Key Vault also stores keys and certificates; those require separate GCP services (Cloud KMS, Certificate Manager)."
