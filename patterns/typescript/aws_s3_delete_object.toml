[pattern]
id = "aws.s3.DeleteObjectCommand -> gcp.gcs.file.delete"
source = "aws"
target = "gcp"
language = "typescript"
confidence = 0.95
tags = ["storage", "s3", "gcs", "delete"]

[pattern.detect]
query = '''
  (call_expression
    function: (member_expression
      object: (identifier) @client
      property: (property_identifier) @method (#eq? @method "send"))
    arguments: (arguments
      (new_expression
        constructor: (identifier) @command (#eq? @command "DeleteObjectCommand")
        arguments: (arguments
          (object) @params))))
'''
imports = ["@aws-sdk/client-s3"]

[pattern.transform]
template = '''await new Storage().bucket({bucket_name}).file({key}).delete()'''
import_add = ["import {Storage} from \"@google-cloud/storage\""]
import_remove = ["import {S3Client, DeleteObjectCommand} from \"@aws-sdk/client-s3\""]

[pattern.bindings]
bucket_name = "params.Bucket"
key = "params.Key"
